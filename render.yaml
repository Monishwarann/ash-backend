services:
  - type: web
    name: ash-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -b 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 10000
      - key: FLASK_DEBUG
        value: "false"
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false # Requires manual entry in Render dashboard for security
